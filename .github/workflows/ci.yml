name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'
          use-public-rspm: true

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.R/library
            ~/.R/Microsoft*
            ~/.R/renv
          key: ${{ runner.os }}-r-${{ hashFiles('DESCRIPTION') }}
          restore-keys: |
            ${{ runner.os }}-r-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libpng-dev \
            libjpeg-dev \
            librsvg2-dev \
            libmagick++-dev \
            libv8-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libicu-dev \
            libcairo2-dev \
            libudunits2-dev \
            libgeos-dev \
            libproj-dev \
            texlive-latex-base \
            texlive-fonts-recommended

      - name: Install R dependencies
        run: |
          # RSPM is configured via use-public-rspm: true in setup-r
          # Use parallel compilation and show only last 50 lines of output to reduce log size
          Rscript -e "options(Ncpus = parallel::detectCores())" \
            -e "install.packages(c('remotes', 'roxygen2', 'devtools', 'testthat'), repos = getOption('repos'), quiet = TRUE, Ncpus = parallel::detectCores())" \
            2>&1 | tail -50
          # Install all dependencies including Suggests (needed for tests, e.g. torchvision)
          Rscript -e "options(Ncpus = parallel::detectCores())" \
            -e "remotes::install_deps(dependencies = c('Depends', 'Imports', 'LinkingTo', 'Suggests'), repos = getOption('repos'), quiet = TRUE, upgrade = 'never', Ncpus = parallel::detectCores())" \
            2>&1 | tail -50

      - name: Build package (Step 1)
        run: |
          bash ./build.sh

      - name: Test (Step 2)
        run: |
          bash run_tests.sh

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: gofigR*.tar.gz
          retention-days: 7

